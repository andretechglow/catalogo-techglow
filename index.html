<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo | TechGlow Imports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1612;
    --cream: #FAF8F4;
    --gold: #B8975A;
    --gold-deep: #8B6F3F;
    --gold-light: #F1E7D3;
    --line: #E3DDD1;
    --card: #FFFFFF;
    --muted: #6B6459;
    --whatsapp: #25D366;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .font-display { font-family: 'Cormorant Garamond', serif; }

  header {
    padding: 48px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 8px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  h1 { font-size: 56px; margin: 0; }
  header p { max-width: 460px; margin: 8px auto 0; font-size: 14px; color: var(--muted); }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,248,244,0.9);
    backdrop-filter: blur(6px);
    padding: 20px 24px 0;
  }
  .toolbar-inner { max-width: 960px; margin: 0 auto; }

  .search {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .search input {
    border: none; outline: none; background: transparent;
    width: 100%; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink);
  }

  .tabs { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 20px; }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--gold-deep);
    font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }

  main { max-width: 960px; margin: 0 auto; padding: 8px 24px 64px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  @media (max-width: 640px) {
    header { padding: 36px 16px 28px; }
    h1 { font-size: 40px; }
    main { padding: 8px 16px 48px; }
    .toolbar { padding: 16px 16px 0; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .thumb { height: 130px; }
    .card-body { padding: 12px; }
    .name { font-size: 16px; margin-bottom: 8px; }
    .price-row { font-size: 17px; }
    .brand { font-size: 9px; }
    .stock-label { font-size: 9px; }
    .stock-pill { font-size: 10px; padding: 5px 9px; margin-bottom: 12px; }
    .cta { font-size: 11px; padding: 9px 8px; }
    .cta svg { width: 12px; height: 12px; }
  }
  .card {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .thumb {
    height: 200px;
    background: linear-gradient(135deg, var(--ink) 0%, #2E2820 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .thumb svg { width: 34px; height: 34px; stroke: var(--gold); }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
  }
  .badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    background: var(--gold); color: var(--ink);
    padding: 4px 8px; border-radius: 999px;
  }

  .card-body { padding: 18px; display: flex; flex-direction: column; flex: 1; }
  .brand { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 4px; }
  .name { font-size: 22px; margin: 0 0 12px; line-height: 1.15; }

  .price-row {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .price-row span.unit { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); margin-left: 4px; }

  .divider { border: none; border-top: 1px solid var(--line); margin: 12px 0; }

  .stock-label {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .stock-pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--line);
    background: var(--gold-light);
    color: var(--gold-deep);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    width: fit-content;
    margin-bottom: 16px;
  }
  .stock-pill strong { color: var(--ink); font-weight: 600; }

  .cta {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--gold); color: var(--ink);
    font-size: 13px; font-weight: 600; padding: 11px 14px; border-radius: 8px;
    text-decoration: none; white-space: nowrap; border: none; cursor: pointer;
    margin-top: auto;
    font-family: 'DM Sans', sans-serif;
  }
  .cta svg { width: 14px; height: 14px; stroke: var(--ink); }
  .cta:hover { background: var(--gold-deep); }

  footer {
    text-align: center; padding: 32px 24px;
    border-top: 1px solid var(--line);
    font-size: 12px; color: #8A8377;
  }
  .empty { text-align: center; padding: 60px 0; font-size: 14px; color: #8A8377; }

  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(26,22,18,0.55);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 14px;
    max-width: 380px;
    width: 100%;
    padding: 28px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 18px; right: 18px;
    background: none; border: none; cursor: pointer;
    color: var(--muted);
  }
  .modal .brand { margin-bottom: 4px; }
  .modal .name { font-size: 26px; margin-bottom: 20px; }

  .qty-label {
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 4px;
  }
  .qty-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  .stepper {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .stepper button {
    width: 42px; height: 42px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--gold-light);
    color: var(--ink);
    font-size: 18px;
    cursor: pointer;
  }
  .stepper button:disabled {
    cursor: not-allowed;
  }
  .stepper .qty-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    color: var(--ink);
  }
  .qty-note { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .modal-total {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 20px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .modal-total .label { font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
  .modal-total .value { font-size: 24px; color: var(--gold-deep); }

  .whatsapp-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--whatsapp); color: #fff;
    font-size: 14px; font-weight: 600; padding: 13px 14px; border-radius: 10px;
    text-decoration: none; border: none; cursor: pointer; width: 100%;
    font-family: 'DM Sans', sans-serif;
  }
  .whatsapp-btn svg { width: 16px; height: 16px; fill: #fff; }
</style>
</head>
<body>

let active = "todos";
let query = "";
let currentProduct = null;
let qty = 1;

const tabsEl = document.getElementById("tabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");

function icon(cat) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[cat] || ICONS.todos}</svg>`;
}

function parsePrice(str) {
  const clean = str.replace(/[R$\s]/g, "").replace(/\./g, "").replace(",", ".");
  return parseFloat(clean);
}

function formatPrice(num) {
  return num.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

function renderTabs() {
  tabsEl.innerHTML = CATEGORIES.map(c => `
    <button class="tab ${active === c.id ? 'active' : ''}" data-cat="${c.id}">
      ${icon(c.id)} ${c.label}
    </button>
  `).join("");
  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      active = btn.dataset.cat;
      renderTabs();
      renderGrid();
    });
  });
}

function renderGrid() {
  const q = query.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    const matchCat = active === "todos" || p.category === active;
    const matchQuery = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
    return matchCat && matchQuery;
  });

  if (filtered.length === 0) {
    gridEl.style.display = "none";
    emptyEl.style.display = "block";
    return;
  }
  gridEl.style.display = "grid";
  emptyEl.style.display = "none";

  gridEl.innerHTML = filtered.map(p => {
    const isDecant = p.category === "decants";
    const isEletronico = p.category === "eletronicos";
    const isBebida = p.category === "bebidas";
    const stockPill = isDecant
      ? `<div class="stock-label">Estoque disponível</div><div class="stock-pill">Decant <strong>5ml</strong></div>`
      : isEletronico
      ? `<div class="stock-label">Estoque disponível</div><div class="stock-pill"><strong>Conferir disponibilidade e cores</strong></div>`
      : isBebida
      ? `<div class="stock-label">Estoque disponível</div><div class="stock-pill"><strong>Sob pedido</strong></div>`
      : `<div class="stock-label">Estoque disponível</div><div class="stock-pill">Disponível: <strong>${p.stock ?? 3}</strong></div>`;
    return `
      <div class="card">
        <div class="thumb">
          ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : icon(p.category)}
          </div>
        <div class="card-body">
          ${p.brand ? `<span class="brand">${p.brand}</span>` : ''}
          <h3 class="name font-display">${p.name}</h3>
          <div class="price-row">${p.price}${isDecant ? '<span class="unit">/5ml</span>' : ''}</div>
          <hr class="divider" />
          ${stockPill}
          <button class="cta" data-id="${p.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Quero Reservar!
          </button>
        </div>
      </div>
    `;
  }).join("");

  gridEl.querySelectorAll(".cta").forEach(btn => {
    btn.addEventListener("click", () => openModal(parseInt(btn.dataset.id)));
  });
}

// ---- Modal logic ----
const overlay = document.getElementById("overlay");
const modalBrand = document.getElementById("modalBrand");
const modalName = document.getElementById("modalName");
const modalQtySub = document.getElementById("modalQtySub");
const qtyValueEl = document.getElementById("qtyValue");
const qtyNoteEl = document.getElementById("qtyNote");
const modalTotalEl = document.getElementById("modalTotal");
const modalWhatsapp = document.getElementById("modalWhatsapp");

function openModal(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  if (!currentProduct) return;
  qty = 1;
  modalBrand.textContent = currentProduct.brand || "";
  modalName.textContent = currentProduct.name;

  const isDecant = currentProduct.category === "decants";
  const isEletronico = currentProduct.category === "eletronicos";
  const isBebida = currentProduct.category === "bebidas";
  const hasLimit = !isDecant && !isEletronico && !isBebida;
  const maxQty = hasLimit ? (currentProduct.stock ?? 3) : null;

  modalQtySub.textContent = isDecant
    ? "Cada unidade equivale a 5ml"
    : isBebida
    ? "Sob pedido"
    : hasLimit
    ? `Unidades disponíveis: ${maxQty}`
    : "Unidades disponíveis";

  updateModal();
  overlay.classList.add("open");
}

function updateModal() {
  const isDecant = currentProduct.category === "decants";
  const isEletronico = currentProduct.category === "eletronicos";
  const isBebida = currentProduct.category === "bebidas";
  const hasLimit = !isDecant && !isEletronico && !isBebida;
  const maxQty = hasLimit ? (currentProduct.stock ?? 3) : null;

  qtyValueEl.textContent = qty;

  const plusBtn = document.getElementById("qtyPlus");
  const minusBtn = document.getElementById("qtyMinus");
  minusBtn.disabled = qty <= 1;
  plusBtn.disabled = hasLimit && qty >= maxQty;
  plusBtn.style.opacity = plusBtn.disabled ? 0.4 : 1;
  minusBtn.style.opacity = minusBtn.disabled ? 0.4 : 1;

  let note = isDecant
    ? `${qty} unidade${qty > 1 ? "s" : ""} × 5ml = ${qty * 5}ml`
    : `${qty} unidade${qty > 1 ? "s" : ""}`;
  if (hasLimit && qty >= maxQty) note += " — quantidade máxima em estoque";
  qtyNoteEl.textContent = note;

  const unitPrice = parsePrice(currentProduct.price);
  const total = unitPrice * qty;
  modalTotalEl.textContent = formatPrice(total);

  const productLabel = isDecant
    ? `${qty}x Decant 5ML - ${currentProduct.name} (${currentProduct.brand})`
    : `${qty}x ${currentProduct.name} (${currentProduct.brand})`;
  const msg = encodeURIComponent(`Olá! Quero reservar: ${productLabel} - Total: ${formatPrice(total)}`);
  modalWhatsapp.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
}

document.getElementById("qtyMinus").addEventListener("click", () => {
  if (qty > 1) { qty--; updateModal(); }
});
document.getElementById("qtyPlus").addEventListener("click", () => {
  const isDecant = currentProduct.category === "decants";
  const isEletronico = currentProduct.category === "eletronicos";
  const isBebida = currentProduct.category === "bebidas";
  const hasLimit = !isDecant && !isEletronico && !isBebida;
  const maxQty = hasLimit ? (currentProduct.stock ?? 3) : null;
  if (hasLimit && qty >= maxQty) return;
  qty++; updateModal();
});
document.getElementById("modalClose").addEventListener("click", () => overlay.classList.remove("open"));
overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("open"); });

document.getElementById("searchInput").addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

renderTabs();
renderGrid();
</script>
