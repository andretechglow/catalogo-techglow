<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo | TechGlow Imports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1A1612;
    --cream: #FAF8F4;
    --gold: #B8975A;
    --gold-deep: #8B6F3F;
    --line: #E3DDD1;
    --card: #FFFFFF;
    --muted: #6B6459;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
  }
  .font-display { font-family: 'Cormorant Garamond', serif; }

  header {
    padding: 48px 24px 40px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 8px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }
  h1 { font-size: 56px; margin: 0; }
  header p { max-width: 460px; margin: 8px auto 0; font-size: 14px; color: var(--muted); }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(250,248,244,0.9);
    backdrop-filter: blur(6px);
    padding: 20px 24px 0;
  }
  .toolbar-inner { max-width: 960px; margin: 0 auto; }

  .search {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .search input {
    border: none; outline: none; background: transparent;
    width: 100%; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink);
  }

  .tabs { display: flex; flex-wrap: wrap; gap: 8px; padding-bottom: 20px; }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--gold-deep);
    font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .tab.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }

  main { max-width: 960px; margin: 0 auto; padding: 8px 24px 64px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .thumb {
    height: 140px;
    background: linear-gradient(135deg, var(--ink) 0%, #2E2820 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .thumb svg { width: 34px; height: 34px; stroke: var(--gold); }
  .badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    background: var(--gold); color: var(--ink);
    padding: 4px 8px; border-radius: 999px;
  }
  .card-body { padding: 16px; display: flex; flex-direction: column; flex: 1; }
  .brand { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 4px; }
  .name { font-size: 20px; margin: 0; line-height: 1.15; }
  .desc { font-size: 12px; color: var(--muted); margin: 6px 0 0; flex: 1; }
  .row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
  .price { font-family: 'Cormorant Garamond', serif; font-size: 18px; }
  .cta {
    display: flex; align-items: center; gap: 6px;
    background: var(--ink); color: var(--cream);
    font-size: 11px; padding: 8px 14px; border-radius: 999px;
    text-decoration: none; white-space: nowrap;
  }
  .cta svg { width: 12px; height: 12px; stroke: var(--cream); }

  footer {
    text-align: center; padding: 32px 24px;
    border-top: 1px solid var(--line);
    font-size: 12px; color: #8A8377;
  }
  .empty { text-align: center; padding: 60px 0; font-size: 14px; color: #8A8377; }
</style>
</head>
<body>

<header>
  <div class="eyebrow"><span class="dot"></span> TechGlow Imports <span class="dot"></span></div>
  <h1 class="font-display">Catálogo</h1>
  <p>Perfumaria árabe e de nicho, decants e seleção de produtos importados sob encomenda!</p>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8B6F3F" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" placeholder="Buscar produto ou marca..." />
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">Nenhum produto encontrado para essa busca.</div>
</main>

<footer>TechGlow Imports · techglowimports.com.br · Atendimento via WhatsApp e Instagram</footer>

<script>
const WHATSAPP_NUMBER = "5544999564157";

const ICONS = {
  todos: '<path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/>',
  perfumes: '<path d="M12 2v4M8 4h8M9 8h6l1 12H8L9 8z"/>',
  decants: '<path d="M12 2c4 4 6 7 6 10a6 6 0 1 1-12 0c0-3 2-6 6-10z"/>',
  eletronicos: '<rect x="6" y="2" width="12" height="20" rx="2"/><path d="M11 18h2"/>',
  bebidas: '<path d="M8 2h8l-1 7a3 3 0 0 1-6 0L8 2z"/><path d="M12 13v9M8 22h8"/>'
};

const CATEGORIES = [
  { id: "todos", label: "Todos" },
  { id: "perfumes", label: "Perfumes" },
  { id: "decants", label: "Decants" },
  { id: "eletronicos", label: "Eletrônicos" },
  { id: "bebidas", label: "Bebidas" }
];

const PRODUCTS = [
  { id: 1, category: "perfumes", brand: "Armaf", name: "Club de Nuit Maleka", desc: "Perfume importado", price: "R$ 249,90" },
  { id: 2, category: "perfumes", brand: "Armaf", name: "Club de Nuit Intense Man", desc: "Perfume importado", price: "R$ 239,90" },
  { id: 3, category: "perfumes", brand: "Armaf", name: "Club de Nuit Urban", desc: "Perfume importado", price: "R$ 259,90" },
  { id: 4, category: "perfumes", brand: "French Avenue", name: "Vulcan Feu", desc: "Perfume importado", price: "R$ 329,90", featured: true },
  { id: 5, category: "perfumes", brand: "French Avenue", name: "Liquid Brun", desc: "Perfume importado", price: "R$ 319,90" },
  { id: 6, category: "perfumes", brand: "French Avenue", name: "Spectre Ghost", desc: "Perfume importado", price: "R$ 289,90" },
  { id: 7, category: "perfumes", brand: "French Avenue", name: "Aether Extrait", desc: "Perfume importado", price: "R$ 319,90" },
  { id: 8, category: "perfumes", brand: "Afnan", name: "Turathi Blue", desc: "Perfume importado", price: "R$ 279,90" },
  { id: 9, category: "perfumes", brand: "Afnan", name: "9PM", desc: "Perfume importado", price: "R$ 239,90" },
  { id: 10, category: "perfumes", brand: "Bidaya", name: "Maktub La Vie", desc: "Perfume importado", price: "R$ 269,90" },
  { id: 11, category: "perfumes", brand: "Bidaya", name: "Habibi King", desc: "Perfume importado", price: "R$ 279,90" },
  { id: 12, category: "perfumes", brand: "Bidaya", name: "Habibi Prince", desc: "Perfume importado", price: "R$ 289,90" },
  { id: 13, category: "perfumes", brand: "Bidaya", name: "Elliur", desc: "Perfume importado", price: "R$ 289,90" },

  { id: 14, category: "decants", brand: "Armaf", name: "Club de Nuit Maleka", desc: "Decant 5ml", price: "R$ 35,90" },
  { id: 15, category: "decants", brand: "Armaf", name: "Club de Nuit Intense Man", desc: "Decant 5ml", price: "R$ 35,90" },
  { id: 16, category: "decants", brand: "Armaf", name: "Club de Nuit Urban", desc: "Decant 5ml", price: "R$ 35,90" },
  { id: 17, category: "decants", brand: "French Avenue", name: "Vulcan Feu", desc: "Decant 5ml", price: "R$ 39,90" },
  { id: 18, category: "decants", brand: "French Avenue", name: "Liquid Brun", desc: "Decant 5ml", price: "R$ 39,90" },
  { id: 19, category: "decants", brand: "French Avenue", name: "Spectre Ghost", desc: "Decant 5ml", price: "R$ 39,90" },
  { id: 20, category: "decants", brand: "French Avenue", name: "Aether Extrait", desc: "Decant 5ml", price: "R$ 45,90", featured: true },
  { id: 21, category: "decants", brand: "Afnan", name: "Turathi Blue", desc: "Decant 5ml", price: "R$ 39,90" },

  { id: 22, category: "eletronicos", brand: "Apple", name: "iPhone 17 256GB", desc: "Lacrado, importado", price: "R$ 5.600,00" },
  { id: 23, category: "eletronicos", brand: "Apple", name: "iPhone 17 Pro 256GB", desc: "Lacrado, importado", price: "R$ 7.990,00" },
  { id: 24, category: "eletronicos", brand: "Apple", name: "iPhone 17 Pro Max 256GB", desc: "Lacrado, importado", price: "R$ 8.990,00", featured: true },
  { id: 25, category: "eletronicos", brand: "Apple", name: "iPad 11 A16 128GB", desc: "Lacrado, importado", price: "R$ 2.600,00" },

  { id: 26, category: "bebidas", brand: "Catena Zapata", name: "Vinho D.V Catena Cabernet Malbec", desc: "Vinho importado", price: "R$ 140,00" },
  { id: 27, category: "bebidas", brand: "Catena Zapata", name: "Vinho Angelica Zapata Malbec", desc: "Vinho importado", price: "R$ 120,00" },
  { id: 28, category: "bebidas", brand: "Ernesto Catena", name: "Vinho Alma Negra", desc: "Vinho importado", price: "R$ 180,00" },
  { id: 29, category: "bebidas", brand: "Whisky", name: "The Dalmore", desc: "Whisky importado", price: "R$ 690,00" },
  { id: 30, category: "bebidas", brand: "Whisky", name: "The Macallan", desc: "Whisky importado", price: "R$ 790,00" }
];

let active = "todos";
let query = "";

const tabsEl = document.getElementById("tabs");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");

function icon(cat) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[cat] || ICONS.todos}</svg>`;
}

function renderTabs() {
  tabsEl.innerHTML = CATEGORIES.map(c => `
    <button class="tab ${active === c.id ? 'active' : ''}" data-cat="${c.id}">
      ${icon(c.id)} ${c.label}
    </button>
  `).join("");
  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      active = btn.dataset.cat;
      renderTabs();
      renderGrid();
    });
  });
}

function renderGrid() {
  const q = query.trim().toLowerCase();
  const filtered = PRODUCTS.filter(p => {
    const matchCat = active === "todos" || p.category === active;
    const matchQuery = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
    return matchCat && matchQuery;
  });

  if (filtered.length === 0) {
    gridEl.style.display = "none";
    emptyEl.style.display = "block";
    return;
  }
  gridEl.style.display = "grid";
  emptyEl.style.display = "none";

  gridEl.innerHTML = filtered.map(p => {
    const msg = encodeURIComponent(`Olá! Quero reservar: ${p.name} (${p.brand}) - ${p.price}`);
    return `
      <div class="card">
        <div class="thumb">
          ${icon(p.category)}
          ${p.featured ? '<span class="badge">Destaque</span>' : ''}
        </div>
        <div class="card-body">
          ${p.brand ? `<span class="brand">${p.brand}</span>` : ''}
          <h3 class="name font-display">${p.name}</h3>
          <p class="desc">${p.desc}</p>
          <div class="row">
            <span class="price font-display">${p.price}</span>
            <a class="cta" target="_blank" rel="noopener noreferrer" href="https://wa.me/${WHATSAPP_NUMBER}?text=${msg}">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              Quero Reservar!
            </a>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

document.getElementById("searchInput").addEventListener("input", (e) => {
  query = e.target.value;
  renderGrid();
});

renderTabs();
renderGrid();
</script>

</body>
</html>
